openapi: 3.0.3
info:
  title: Online Event Booking API
  description: Tài liệu Swagger phục vụ kiểm thử các API quản lý, thanh toán và xuất hóa đơn đặt chỗ.
  version: 1.0.0
servers:
  - url: http://localhost:8080/api
    description: Local Development Server (Có context-path)
paths:
  /bookings/{id}/pay:
    post:
      tags:
        - Booking Management
      summary: Thanh toán lượt đặt chỗ
      description: Thực hiện quy trình thanh toán cho đơn đặt chỗ dựa trên ID.
      parameters:
        - name: id
          in: path
          required: true
          description: ID của đơn đặt chỗ cần thanh toán
          schema:
            type: integer
            format: int64
          example: 1
      responses:
        '200':
          description: Thanh toán thành công và trả về trạng thái mới.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBookingResponse'

  /bookings/{id}/cancel:
    post:
      tags:
        - Booking Management
      summary: Hủy lượt đặt chỗ
      description: Yêu cầu hủy đơn đặt chỗ đã chọn.
      parameters:
        - name: id
          in: path
          required: true
          description: ID của đơn đặt chỗ cần hủy
          schema:
            type: integer
            format: int64
          example: 1
      responses:
        '200':
          description: Hủy đơn đặt chỗ thành công.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBookingResponse'

  /bookings/{id}/confirmation:
    post:
      tags:
        - Booking Management
      summary: Xác nhận đặt chỗ và xuất file hóa đơn PDF
      description: API xử lý việc xác nhận và trả về một luồng dữ liệu nhị phân của file PDF hóa đơn.
      parameters:
        - name: id
          in: path
          required: true
          description: ID của đơn đặt chỗ cần xuất PDF
          schema:
            type: integer
            format: int64
          example: 1
      responses:
        '200':
          description: Xuất file PDF thành công. Trình duyệt hoặc công cụ test sẽ tự động tải file xuống.
          headers:
            Content-Disposition:
              schema:
                type: string
                example: attachment; filename=booking_confirmation_1.pdf
          content:
            application/pdf:
              schema:
                type: string
                format: binary

components:
  schemas:
    ApiResponseBookingResponse:
      type: object
      properties:
        code:
          type: integer
          example: 1000
        message:
          type: string
          example: "Success"
        result:
          $ref: '#/components/schemas/BookingResponse'
          
    BookingResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        status:
          type: string
          example: "PAID"
        totalPrice:
          type: number
          format: double
          example: 150000.0