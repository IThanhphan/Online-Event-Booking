server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: booking_event
  datasource:
    url: "jdbc:mysql://localhost:3306/event_booking"
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration